name: Create Issue on Failure
description: "Creates a GitHub Issue per failed step with workflow failure details when a previous step fails. Requires permissions: issues: write, actions: read."

runs:
  using: composite
  steps:
    - name: Create issue
      shell: bash
      run: |
        FAILED_STEPS=""
        PREV_COUNT=-1
        for i in 1 2 3 4 5; do
          sleep 2
          FAILED_STEPS=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            | jq -r --arg job "${{ github.job }}" \
              '.jobs[] | select(.name == $job) | .steps[] | select(.conclusion == "failure") | .name')
          COUNT=$(echo "$FAILED_STEPS" | grep -c . || true)
          [ "$COUNT" -gt 0 ] && [ "$COUNT" -eq "$PREV_COUNT" ] && break
          PREV_COUNT=$COUNT
        done

        if [ -z "$FAILED_STEPS" ]; then
          echo "::error::No failed steps found after retries. This is unexpected — the action should only run on failure."
          exit 1
        fi

        while IFS= read -r STEP_NAME; do
          TITLE="ci: step $STEP_NAME failed in workflow ${{ github.workflow }}"

          EXISTING_URL=$(gh api --paginate \
            "/repos/${{ github.repository }}/issues?state=open&per_page=100" \
            | jq -r --arg title "$TITLE" '.[] | select(.title == $title) | .html_url' \
            | head -1)

          if [ -n "$EXISTING_URL" ]; then
            echo "Issue already exists: $EXISTING_URL"
            continue
          fi

          CREATED_URL=$(gh api \
            --method POST \
            /repos/${{ github.repository }}/issues \
            -f title="$TITLE" \
            -f body="## Workflow Failure Report

        - **Workflow:** ${{ github.workflow }}
        - **Failed step:** $STEP_NAME
        - **Triggered by:** ${{ github.event_name }}
        - **Actor:** ${{ github.actor }}
        - **Commit:** ${{ github.sha }}
        - **Run URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --jq ".html_url")

          echo "Issue created: $CREATED_URL"
        done <<< "$FAILED_STEPS"
