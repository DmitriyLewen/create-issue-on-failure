name: Create Issue on Failure
description: "Creates a GitHub Issue with workflow failure details when a previous step fails. Requires permissions: issues: write."

runs:
  using: composite
  steps:
    - name: Create issue
      shell: bash
      run: |
        gh api \
          --method POST \
          /repos/${{ github.repository }}/issues \
          -f title="ci: workflow ${{ github.workflow }} failed" \
          -f body="## Workflow Failure Report

        - **Workflow:** ${{ github.workflow }}
        - **Job:** ${{ github.job }}
        - **Run:** #${{ github.run_number }}
        - **Triggered by:** ${{ github.event_name }}
        - **Actor:** ${{ github.actor }}
        - **Branch:** ${{ github.ref_name }}
        - **Commit:** ${{ github.sha }}
        - **Run URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
